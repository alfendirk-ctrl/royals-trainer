name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download royal photos
        env:
          GET_FILENAME_PY: |
            import urllib.request, urllib.parse, json, sys, re
            wiki_title = sys.argv[1]
            enc = urllib.parse.quote(wiki_title, safe='')
            url = 'https://en.wikipedia.org/api/rest_v1/page/summary/' + enc
            req = urllib.request.Request(url, headers={
                'User-Agent': 'RoyalsTrainer/1.0 (alfendirk@gmail.com)',
                'Accept': 'application/json'})
            try:
                with urllib.request.urlopen(req, timeout=15) as r:
                    d = json.loads(r.read())
                src = d.get('thumbnail', {}).get('source', '')
                m = re.search(r'/thumb/[0-9a-f]/[0-9a-f]{2}/([^/]+)/', src)
                if m:
                    print(m.group(1))
                    sys.exit(0)
                print('NOT_FOUND', file=sys.stderr)
                sys.exit(1)
            except Exception as e:
                print(f'ERROR: {e}', file=sys.stderr)
                sys.exit(1)
        run: |
          mkdir -p images
          echo "$GET_FILENAME_PY" > /tmp/get_filename.py
          declare -A wiki=(
            ["willem-alexander"]="Willem-Alexander of the Netherlands"
            ["elizabeth-ii"]="Elizabeth II"
            ["diana"]="Diana, Princess of Wales"
            ["charles-iii"]="Charles III"
            ["maxima"]="M%C3%A1xima of the Netherlands"
            ["felipe-vi"]="Felipe VI"
            ["grace-kelly"]="Grace Kelly"
            ["beatrix"]="Beatrix of the Netherlands"
            ["margrethe-ii"]="Margrethe II"
            ["catherine"]="Catherine, Princess of Wales"
            ["letizia"]="Letizia of Spain"
            ["william"]="William, Prince of Wales"
            ["harald-v"]="Harald V of Norway"
            ["frederik-x"]="Frederik X of Denmark"
            ["albert-ii"]="Albert II, Prince of Monaco"
            ["carl-xvi-gustaf"]="Carl XVI Gustaf of Sweden"
            ["victoria"]="Victoria, Crown Princess of Sweden"
            ["filip"]="Philippe of Belgium"
            ["mary"]="Mary, Queen of Denmark"
            ["haakon"]="Haakon, Crown Prince of Norway"
          )
          fail=0
          echo "Total keys: ${#wiki[@]}"
          for name in "${!wiki[@]}"; do
            title="${wiki[$name]}"
            echo "DEBUG: processing $name -> $title"
            filename=$(python3 /tmp/get_filename.py "$title" 2>/tmp/err_${name}.txt)
            if [ $? -ne 0 ]; then
              echo "::warning::Could not resolve filename for $name: $(cat /tmp/err_${name}.txt)"
              fail=1
              continue
            fi
            code=$(curl -sL --max-time 30 \
              -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36" \
              -H "Referer: https://en.wikipedia.org/" \
              -w "%{http_code}" \
              -o "images/${name}.jpg" \
              "https://commons.wikimedia.org/w/thumb.php?f=${filename}&w=320")
            size=$(stat -c%s "images/${name}.jpg")
            ctype=$(file -b --mime-type "images/${name}.jpg")
            echo "$name ($filename): http=$code size=$size type=$ctype"
            if [ "$code" != "200" ] || [ "$ctype" != "image/jpeg" ]; then
              echo "::error::Failed to download $name (http=$code type=$ctype)"
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            echo "::error::One or more royal photos failed to download"
            exit 1
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
