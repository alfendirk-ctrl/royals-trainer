name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test alternative image sources
        run: |
          echo "=== SOURCE 1: commons.wikimedia.org/w/thumb.php ==="
          code=$(curl -sL --max-time 20 \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36" \
            -H "Referer: https://commons.wikimedia.org/" \
            -w "%{http_code}" -o /tmp/s1.jpg \
            "https://commons.wikimedia.org/w/thumb.php?f=King_Willem-Alexander_June_2015_(1).JPG&w=400")
          echo "commons thumb.php: http=$code size=$(stat -c%s /tmp/s1.jpg) type=$(file -b --mime-type /tmp/s1.jpg)"

          echo "=== SOURCE 2: Internet Archive Wayback Machine ==="
          code=$(curl -sL --max-time 30 \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36" \
            -w "%{http_code}" -o /tmp/s2.jpg \
            "https://web.archive.org/web/2024/https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/King_Willem-Alexander_June_2015_%281%29.JPG/400px-King_Willem-Alexander_June_2015_%281%29.JPG")
          echo "archive.org: http=$code size=$(stat -c%s /tmp/s2.jpg) type=$(file -b --mime-type /tmp/s2.jpg)"

          echo "=== SOURCE 3: Picryl.com (public domain CDN) ==="
          code=$(curl -sL --max-time 20 \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36" \
            -w "%{http_code}" -o /tmp/s3.jpg \
            "https://p1.picryl.com/media/king-willem-alexander-june-2015-1-0f0ac9-640.jpg")
          echo "picryl.com: http=$code size=$(stat -c%s /tmp/s3.jpg) type=$(file -b --mime-type /tmp/s3.jpg)"

          echo "=== SOURCE 4: Nederlandse Koninklijk Huis (official press photo) ==="
          code=$(curl -sL --max-time 20 \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36" \
            -w "%{http_code}" -o /tmp/s4.jpg \
            "https://www.koninklijkhuis.nl/binaries/medium/content/gallery/koninklijkhuis/content-afbeeldingen/leden-koninklijk-huis/willem-alexander/2021/koning-willem-alexander-2019-rvu-004.jpg")
          echo "koninklijkhuis.nl: http=$code size=$(stat -c%s /tmp/s4.jpg) type=$(file -b --mime-type /tmp/s4.jpg)"

          echo "=== SOURCE 5: Wikimedia via w3.org mirror proxy check ==="
          code=$(curl -sL --max-time 20 \
            -H "User-Agent: Mozilla/5.0" \
            -w "%{http_code}" -o /tmp/s5.jpg \
            "https://upload.wikimedia.org/wikipedia/commons/6/6d/King_Willem-Alexander_June_2015_%281%29.JPG")
          echo "wikimedia original (no thumb): http=$code size=$(stat -c%s /tmp/s5.jpg) type=$(file -b --mime-type /tmp/s5.jpg)"

          exit 1

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
