name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download royal photos
        env:
          GET_FILENAME_PY: |
            import urllib.request, urllib.parse, json, sys, re
            wiki_title = sys.argv[1]
            enc = urllib.parse.quote(wiki_title, safe='')
            url = 'https://en.wikipedia.org/api/rest_v1/page/summary/' + enc
            req = urllib.request.Request(url, headers={
                'User-Agent': 'RoyalsTrainer/1.0 (alfendirk@gmail.com)',
                'Accept': 'application/json'})
            try:
                with urllib.request.urlopen(req, timeout=15) as r:
                    d = json.loads(r.read())
                src = d.get('thumbnail', {}).get('source', '')
                m = re.search(r'/thumb/[0-9a-f]/[0-9a-f]{2}/([^/]+)/', src)
                if m:
                    print(m.group(1))
                    sys.exit(0)
                print('NOT_FOUND', file=sys.stderr)
                sys.exit(1)
            except Exception as e:
                print(f'ERROR: {e}', file=sys.stderr)
                sys.exit(1)
        run: |
          mkdir -p images
          echo "$GET_FILENAME_PY" > /tmp/get_filename.py
          declare -A wiki=(
            ["willem-alexander"]="Willem-Alexander of the Netherlands"
            ["elizabeth-ii"]="Elizabeth II"
            ["diana"]="Diana, Princess of Wales"
            ["charles-iii"]="Charles III"
            ["maxima"]="Máxima of the Netherlands"
            ["felipe-vi"]="Felipe VI"
            ["grace-kelly"]="Grace Kelly"
            ["beatrix"]="Beatrix of the Netherlands"
            ["margrethe-ii"]="Margrethe II"
            ["catherine"]="Catherine, Princess of Wales"
            ["letizia"]="Letizia of Spain"
            ["william"]="William, Prince of Wales"
            ["harald-v"]="Harald V of Norway"
            ["frederik-x"]="Frederik X of Denmark"
            ["albert-ii"]="Albert II, Prince of Monaco"
            ["carl-xvi-gustaf"]="Carl XVI Gustaf of Sweden"
            ["victoria"]="Victoria, Crown Princess of Sweden"
            ["filip"]="Philippe of Belgium"
            ["mary"]="Mary, Queen of Denmark"
            ["haakon"]="Haakon, Crown Prince of Norway"
            ["anne"]="Anne, Princess Royal"
            ["juan-carlos"]="Juan Carlos I"
            ["mathilde"]="Mathilde of Belgium"
            ["charlene"]="Charlene, Princess of Monaco"
            ["mette-marit"]="Mette-Marit, Crown Princess of Norway"
            ["henri"]="Henri, Grand Duke of Luxembourg"
            ["amalia"]="Amalia of the Netherlands"
            ["ingrid-alexandra"]="Princess Ingrid Alexandra"
          )
          download_royal() {
            local name="$1" title="$2" fatal="$3"
            if filename=$(python3 /tmp/get_filename.py "$title" 2>/tmp/err_${name}.txt); then
              code=$(curl -sL --max-time 30 \
                -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36" \
                -H "Referer: https://en.wikipedia.org/" \
                -w "%{http_code}" \
                -o "images/${name}.jpg" \
                "https://commons.wikimedia.org/w/thumb.php?f=${filename}&w=320")
              size=$(stat -c%s "images/${name}.jpg")
              ctype=$(file -b --mime-type "images/${name}.jpg")
              echo "$name ($filename): http=$code size=$size type=$ctype"
              if [ "$code" != "200" ] || [ "$ctype" != "image/jpeg" ]; then
                if [ "$fatal" = "1" ]; then
                  echo "::error::Failed to download $name (http=$code type=$ctype)"
                  return 1
                else
                  echo "::warning::Failed to download $name (http=$code type=$ctype)"
                  rm -f "images/${name}.jpg"
                fi
              fi
            else
              if [ "$fatal" = "1" ]; then
                echo "::error::Could not resolve filename for $name: $(cat /tmp/err_${name}.txt)"
                return 1
              else
                echo "::warning::Could not resolve filename for $name: $(cat /tmp/err_${name}.txt)"
              fi
            fi
            return 0
          }

          fail=0
          for name in "${!wiki[@]}"; do
            download_royal "$name" "${wiki[$name]}" 1 || fail=1
          done
          if [ "$fail" = "1" ]; then
            echo "::error::One or more core royal photos failed to download"
            exit 1
          fi

          declare -A wiki_ext=(
            # Nederland (irene + constantijn zijn static files in repo)
            ["juliana"]="Juliana of the Netherlands"
            ["wilhelmina"]="Wilhelmina of the Netherlands"
            ["bernhard-sr"]="Bernhard of Lippe-Biesterfeld"
            ["margriet"]="Margriet of the Netherlands"
            ["mabel"]="Princess Mabel of Orange-Nassau"
            ["alexia"]="Princess Alexia of the Netherlands"
            ["ariane"]="Ariane of the Netherlands"
            # Verenigd Koninkrijk
            ["harry"]="Harry, Duke of Sussex"
            ["meghan"]="Meghan, Duchess of Sussex"
            ["camilla"]="Camilla, Queen of the United Kingdom"
            ["philip"]="Prince Philip, Duke of Edinburgh"
            ["margaret"]="Princess Margaret, Countess of Snowdon"
            ["victoria-queen"]="Queen Victoria"
            ["edward-viii"]="Edward VIII"
            ["andrew"]="Prince Andrew, Duke of York"
            ["edward-uk"]="Edward, Duke of Edinburgh"
            ["sophie"]="Sophie, Duchess of Edinburgh"
            ["beatrice"]="Princess Beatrice of York"
            ["eugenie"]="Princess Eugenie of York"
            ["zara"]="Zara Tindall"
            # Spanje (sofia-queen, cristina, sofia-infanta hebben geen Wikipedia-thumbnail)
            # Monaco
            ["rainier"]="Rainier III, Prince of Monaco"
            ["caroline"]="Caroline, Princess of Hanover"
            ["stephanie-monaco"]="Stéphanie, Princess of Monaco"
            # Denemarken
            ["joachim"]="Prince Joachim of Denmark"
            ["christian-denmark"]="Christian, Crown Prince of Denmark"
            ["henrik"]="Henrik, Prince Consort of Denmark"
            ["benedikte"]="Benedikte of Denmark"
            # Noorwegen
            ["sonja"]="Sonja of Norway"
            ["martha-louise"]="Märtha Louise of Norway"
            ["sverre"]="Sverre Magnus of Norway"
            # Zweden
            ["silvia"]="Silvia of Sweden"
            ["carl-philip"]="Carl Philip, Duke of Värmland"
            ["madeleine"]="Princess Madeleine of Sweden"
            ["daniel-sweden"]="Daniel, Duke of Västergötland"
            ["estelle"]="Estelle of Sweden"
            # België (paola + elisabeth-bel hebben geen Wikipedia-thumbnail)
            ["boudewijn"]="Baudouin of Belgium"
            ["albert-ii-bel"]="Albert II of Belgium"
            ["fabiola"]="Fabiola of Belgium"
            ["astrid-bel"]="Princess Astrid of Belgium"
            # Luxemburg
            ["jean-lux"]="Jean, Grand Duke of Luxembourg"
            ["maria-teresa"]="Maria Teresa, Grand Duchess of Luxembourg"
            ["guillaume-lux"]="Guillaume, Hereditary Grand Duke of Luxembourg"
            ["stephanie-lux"]="Stéphanie, Hereditary Grand Duchess of Luxembourg"
          )
          for name in "${!wiki_ext[@]}"; do
            download_royal "$name" "${wiki_ext[$name]}" 0
          done

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
