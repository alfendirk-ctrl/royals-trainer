name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download royal photos
        run: |
          mkdir -p images

          # Test which fetch method works against Wikimedia from this runner
          TEST_URL="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/King_Willem-Alexander_June_2015_%281%29.JPG/400px-King_Willem-Alexander_June_2015_%281%29.JPG"

          echo "=== METHOD 1: curl with full browser headers ==="
          code=$(curl -sL --max-time 20 --http1.1 \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: image/avif,image/webp,image/apng,image/*,*/*;q=0.8" \
            -H "Accept-Language: en-US,en;q=0.9" \
            -H "Accept-Encoding: gzip, deflate, br" \
            -H "Referer: https://en.wikipedia.org/" \
            -w "%{http_code}" -o /tmp/test1.jpg "$TEST_URL")
          echo "curl browser UA: http=$code size=$(stat -c%s /tmp/test1.jpg 2>/dev/null) type=$(file -b --mime-type /tmp/test1.jpg 2>/dev/null)"

          echo "=== METHOD 2: wget ==="
          wget -q --max-redirect=5 --timeout=20 \
            --user-agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36" \
            -O /tmp/test2.jpg "$TEST_URL" 2>&1
          echo "wget: size=$(stat -c%s /tmp/test2.jpg 2>/dev/null) type=$(file -b --mime-type /tmp/test2.jpg 2>/dev/null)"

          echo "=== METHOD 3: Python urllib ==="
          python3 - <<'PYEOF'
          import urllib.request, os, sys
          url = "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/King_Willem-Alexander_June_2015_%281%29.JPG/400px-King_Willem-Alexander_June_2015_%281%29.JPG"
          req = urllib.request.Request(url, headers={
            "User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36",
            "Accept": "image/webp,image/*,*/*;q=0.8",
            "Accept-Language": "en-US,en;q=0.9",
            "Referer": "https://en.wikipedia.org/",
          })
          try:
            with urllib.request.urlopen(req, timeout=20) as r:
              data = r.read()
              open("/tmp/test3.jpg", "wb").write(data)
              print(f"python urllib: status={r.status} size={len(data)}")
          except Exception as e:
            print(f"python urllib: FAILED {e}")
          PYEOF

          echo "=== METHOD 4: via commons.wikimedia.org/wiki/Special:FilePath ==="
          COMMONS_URL="https://commons.wikimedia.org/wiki/Special:FilePath/King_Willem-Alexander_June_2015_(1).JPG?width=400"
          code=$(curl -sL --max-time 20 --http1.1 \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: image/avif,image/webp,image/apng,image/*,*/*;q=0.8" \
            -H "Referer: https://commons.wikimedia.org/" \
            -w "%{http_code}" -o /tmp/test4.jpg "$COMMONS_URL")
          echo "commons Special:FilePath: http=$code size=$(stat -c%s /tmp/test4.jpg 2>/dev/null) type=$(file -b --mime-type /tmp/test4.jpg 2>/dev/null)"

          echo "=== METHOD 5: Wikimedia REST API thumbnail ==="
          API_JSON=$(curl -sL --max-time 20 \
            -H "User-Agent: RoyalsTrainer/1.0 (https://github.com/alfendirk-ctrl/royals-trainer; alfendirk@gmail.com)" \
            "https://en.wikipedia.org/api/rest_v1/page/summary/Willem-Alexander")
          THUMB=$(echo "$API_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('thumbnail',{}).get('source',''))" 2>/dev/null)
          echo "Wikipedia API thumbnail URL: $THUMB"
          if [ -n "$THUMB" ]; then
            code=$(curl -sL --max-time 20 --http1.1 \
              -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36" \
              -H "Referer: https://en.wikipedia.org/" \
              -w "%{http_code}" -o /tmp/test5.jpg "$THUMB")
            echo "wikipedia REST thumb: http=$code size=$(stat -c%s /tmp/test5.jpg 2>/dev/null) type=$(file -b --mime-type /tmp/test5.jpg 2>/dev/null)"
          fi

          echo "=== DONE — check above which method succeeded ==="
          exit 1

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
